<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="iconGradLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06c2ac;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowLineLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a6cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06c2ac;stop-opacity:1" />
    </linearGradient>
    <filter id="glowLight" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon: abstract flow / insight eye mark -->
  <g transform="translate(12, 10)">
    <!-- Outer arc ring -->
    <circle cx="30" cy="30" r="26" fill="none" stroke="url(#iconGradLight)" stroke-width="2.5" stroke-dasharray="120 44" stroke-linecap="round"/>
    <!-- Inner data bars (bar chart insight metaphor) -->
    <rect x="17" y="28" width="5" height="14" rx="2.5" fill="url(#iconGradLight)" opacity="0.5"/>
    <rect x="25" y="20" width="5" height="22" rx="2.5" fill="url(#iconGradLight)" opacity="0.75"/>
    <rect x="33" y="24" width="5" height="18" rx="2.5" fill="url(#iconGradLight)"/>
    <!-- Flow dot accent -->
    <circle cx="30" cy="10" r="3" fill="#1a6cf6" filter="url(#glowLight)"/>
    <!-- Flow arrow accent -->
    <path d="M 44 30 Q 52 22 50 14" fill="none" stroke="url(#flowLineLight)" stroke-width="2" stroke-linecap="round"/>
    <polygon points="50,14 46,19 54,18" fill="#06c2ac"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(78, 0)">
    <!-- "Insight" -->
    <text x="0" y="48"
      font-family="'Georgia', 'Times New Roman', serif"
      font-size="32"
      font-weight="700"
      letter-spacing="-0.5"
      fill="#0f172a">Insight</text>
    <!-- "Flow" with gradient -->
    <text x="112" y="48"
      font-family="'Georgia', 'Times New Roman', serif"
      font-size="32"
      font-weight="700"
      letter-spacing="-0.5"
      fill="url(#flowLineLight)">Flow</text>
    <!-- Tagline -->
    <text x="1" y="65"
      font-family="'Courier New', monospace"
      font-size="10.5"
      letter-spacing="3.5"
      fill="#64748b">ANALYTICS PLATFORM</text>
  </g>

  <!-- Underline accent -->
  <rect x="78" y="70" width="230" height="2" rx="1" fill="url(#flowLineLight)" opacity="0.3"/>
</svg>
