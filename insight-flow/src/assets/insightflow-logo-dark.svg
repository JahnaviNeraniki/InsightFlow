<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <defs>
    <linearGradient id="iconGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="flowLineDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#34d399;stop-opacity:1" />
    </linearGradient>
    <filter id="glowDark" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="barGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>



  <!-- Subtle grid texture dots -->
  <g opacity="0.08">
    <circle cx="160" cy="20" r="1" fill="#60a5fa"/>
    <circle cx="200" cy="40" r="1" fill="#60a5fa"/>
    <circle cx="240" cy="20" r="1" fill="#60a5fa"/>
    <circle cx="280" cy="55" r="1" fill="#60a5fa"/>
    <circle cx="100" cy="60" r="1" fill="#60a5fa"/>
  </g>

  <!-- Icon -->
  <g transform="translate(12, 10)">
    <!-- Outer glow ring -->
    <circle cx="30" cy="30" r="27" fill="none" stroke="url(#iconGradDark)" stroke-width="0.5" opacity="0.3"/>
    <circle cx="30" cy="30" r="26" fill="none" stroke="url(#iconGradDark)" stroke-width="2.5" stroke-dasharray="120 44" stroke-linecap="round" filter="url(#glowDark)"/>
    <!-- Inner data bars -->
    <rect x="17" y="28" width="5" height="14" rx="2.5" fill="#60a5fa" opacity="0.45" filter="url(#barGlow)"/>
    <rect x="25" y="20" width="5" height="22" rx="2.5" fill="#60a5fa" opacity="0.7" filter="url(#barGlow)"/>
    <rect x="33" y="24" width="5" height="18" rx="2.5" fill="url(#iconGradDark)" filter="url(#barGlow)"/>
    <!-- Glow dot -->
    <circle cx="30" cy="10" r="3.5" fill="#60a5fa" filter="url(#glowDark)" opacity="0.9"/>
    <circle cx="30" cy="10" r="2" fill="#fff"/>
    <!-- Flow arrow -->
    <path d="M 44 30 Q 52 22 50 14" fill="none" stroke="url(#flowLineDark)" stroke-width="2" stroke-linecap="round" filter="url(#glowDark)"/>
    <polygon points="50,14 46,19 54,18" fill="#34d399"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(78, 0)">
    <text x="0" y="48"
      font-family="'Georgia', 'Times New Roman', serif"
      font-size="32"
      font-weight="700"
      letter-spacing="-0.5"
      fill="#f1f5f9">Insight</text>
    <text x="112" y="48"
      font-family="'Georgia', 'Times New Roman', serif"
      font-size="32"
      font-weight="700"
      letter-spacing="-0.5"
      fill="url(#flowLineDark)">Flow</text>
    <text x="1" y="65"
      font-family="'Courier New', monospace"
      font-size="10.5"
      letter-spacing="3.5"
      fill="#475569">ANALYTICS PLATFORM</text>
  </g>

  <!-- Underline accent -->
  <rect x="78" y="70" width="230" height="1.5" rx="1" fill="url(#flowLineDark)" opacity="0.45"/>
</svg>
